version: 2

project_name: tetra

before:
  hooks:
    - go mod tidy

builds:
  - id: tetra
    main: ./cmd/tetra
    # Binary is `tetra-tui` rather than `tetra` so the release archives
    # and the homebrew bottle don't fight homebrew-core's existing
    # `tetra` (cilium/tetragon) over /opt/homebrew/bin/tetra. The Go
    # `go install` path still produces a binary called `tetra` because
    # that comes from the cmd dir name, not goreleaser's config.
    binary: tetra-tui
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: tetra
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch

release:
  github:
    owner: gen-hiroto0119
    name: tetra
  draft: false
  prerelease: auto
  header: |
    ## tetra {{ .Tag }}

    A silent code viewer for the AI coding era.

    Install via `go install github.com/gen-hiroto0119/tetra/cmd/tetra@{{ .Tag }}` or download a binary below.

brews:
  # Formula name is tetra-tui (not tetra) because homebrew-core already
  # ships an unrelated `tetra` package — `brew install tetra` resolves
  # to that one. The binary inside this formula is still named `tetra`,
  # so users get the same `tetra` command on PATH after install.
  - name: tetra-tui
    repository:
      owner: gen-hiroto0119
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
    homepage: 'https://github.com/gen-hiroto0119/tetra'
    description: 'A silent code viewer for the AI coding era.'
    license: MIT
    install: |
      bin.install "tetra-tui"
    test: |
      # tetra-tui is a TUI with no -h / --help flag (would launch the
      # alt-screen and hang in CI). --version short-circuits before any
      # tea.Program setup so it's safe to run inside brew test.
      assert_match "tetra", shell_output("#{bin}/tetra-tui --version")
